# GitHub Actions — AFL++ CI/CD snippet
# Lines of YAML: ~65 | Docker: none (afl++ in ubuntu-latest apt)
# Exits cleanly on timeout: YES (using timeout command + SIGINT handling)
# NOTE: AFL++ requires sysctl core_pattern tweak — done via sudo in runner.

name: Fuzz cJSON (AFL++)

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'   # weekly Monday 03:00 UTC

jobs:
  aflplusplus:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install AFL++ + clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y afl++ clang

      - name: Configure kernel for AFL++
        run: |
          # Required by AFL++ — disable core dumps to file (speeds up crash detection)
          echo core | sudo tee /proc/sys/kernel/core_pattern
          echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor 2>/dev/null || true

      - name: Restore corpus cache
        uses: actions/cache@v4
        with:
          path: findings/afl/cjson/queue
          key: corpus-cjson-afl-${{ github.ref_name }}
          restore-keys: |
            corpus-cjson-afl-

      - name: Build fuzz target (AFL++)
        run: |
          mkdir -p build
          AFL_USE_ASAN=1 AFL_USE_UBSAN=1 \
          afl-clang-fast -g -O1 \
                harnesses/fuzz_cjson.c targets/cjson/cJSON.c \
                -I targets/cjson/ \
                -o build/fuzz_cjson_afl

      - name: Run 5-minute fuzzing campaign
        run: |
          mkdir -p findings/afl/cjson
          # AFL_EXIT_WHEN_DONE ensures clean exit; timeout enforces wall-clock limit
          AFL_NO_UI=1 timeout 310 \
            afl-fuzz \
              -i corpus/cjson/ \
              -o findings/afl/cjson/ \
              -t 1000 \
              -- ./build/fuzz_cjson_afl @@ || true

      - name: Fail if new crashes found
        run: |
          if ls findings/afl/cjson/default/crashes/id:* 2>/dev/null | grep -q .; then
            echo "::error::New crashes detected by AFL++!"
            ls -la findings/afl/cjson/default/crashes/
            exit 1
          fi
          echo "No crashes found."

      - name: Save crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: afl-crashes
          path: findings/afl/cjson/default/crashes/

      - name: Save fuzzer stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afl-stats
          path: findings/afl/cjson/default/fuzzer_stats
